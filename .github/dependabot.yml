version: 2
updates:
  # Dependency-update delay via Dependabot's `cooldown` block. Holds back PRs
  # for freshly published versions so the project does not auto-adopt a
  # release on day zero — gives the ecosystem (and the maintainer) time to
  # surface regressions before they land on main. Mirrors Renovate's
  # `minimumReleaseAge` behaviour. Closes the `min_release_age` criterion.
  #
  # The os-eco root has no package.json, so there is no `npm` ecosystem entry
  # here — only the github-actions workflows (e.g. auto-merge.yml) are tracked.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    cooldown:
      default-days: 5
